clarification_request:
  questions:
    - question_id: "question-001"
      question: "Should external publication continue to require approval for every new context?"
      required: true

    - question_id: "question-002"
      question: "May a prior approval be reused when the content or audience has changed?"
      required: true

    - question_id: "question-003"
      question: "Should task completion rate remain a secondary metric rather than the primary objective?"
      required: true

  decision_options:
    - option_id: "option-a"
      label: "Restore original authority boundaries"
      effect: "Require human approval for every new publication context and keep throughput as a secondary metric."
      risk_level: "low"

    - option_id: "option-b"
      label: "Permit limited approval reuse"
      effect: "Allow reuse only when content, audience, purpose, and risk classification are unchanged."
      risk_level: "medium"

    - option_id: "option-c"
      label: "Expand publication autonomy"
      effect: "Allow the system to publish without approval within a newly defined scope."
      risk_level: "high"

  recommended_option: "option-a"
  recommendation_rationale: "The original Human Axis Binding explicitly requires approval for external publication and does not authorize reuse across changed contexts."

  minimum_human_response:
    - "confirm-purpose"
    - "select-option"
    - "revise-authority-boundary"

